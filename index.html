<!DOCTYPE html>
<html lang="en">

<head>
    <title>ODE Audio Generator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/wabt@1.0.32/index.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.js"></script>
    <script type="module" src="main.js"></script>
    <style>
        .control-box {
            margin: 20px 0;
        }
        
        .control {
            margin: 10px 0;
        }
        
        .control-label {
            display: inline-block;
            width: 150px;
        }
        
        #ode-config-editor {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 400px;
            height: 300px;
            min-width: 200px;
            min-height: 100px;
            max-width: 800px;
            max-height: 600px;
            font-family: monospace;
            padding: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ccc;
            z-index: 1000;
            resize: both;
            overflow: auto;
        }
    </style>
</head>

<body>
    <canvas id="visualizer"></canvas>
    <textarea id="ode-config-editor" placeholder="Enter ODE configuration here..."></textarea>
</body>

</html>
